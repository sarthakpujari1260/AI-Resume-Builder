<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80" font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif">

  <!-- Page body -->
  <path d="M10 5 L54 5 L54 30 L72 30 L72 75 L10 75 Z" fill="#1A1A1A"/>
  <!-- Fold triangle -->
  <path d="M54 5 L72 30 L54 30 Z" fill="#3D3D3D"/>
  <!-- Fold crease -->
  <line x1="54" y1="5" x2="72" y2="30" stroke="#ffffff22" stroke-width="1"/>

  <!-- R letter -->
  <text x="16" y="54" font-size="36" font-weight="700" fill="#F5F5F5" font-family="'Segoe UI', Arial, sans-serif">R</text>

  <!-- Resume lines -->
  <rect x="14" y="60" width="34" height="3.5" rx="1.5" fill="white" opacity="0.3"/>
  <rect x="14" y="67" width="24" height="3.5" rx="1.5" fill="white" opacity="0.2"/>

  <!-- Wordmark -->
  <text x="90" y="50" font-size="38" font-weight="600" fill="#1A1A1A" letter-spacing="-0.5" font-family="'Segoe UI', 'Inter', Arial, sans-serif">Resum<tspan fill="#9E9E9E">e</tspan>fy</text>

</svg>
